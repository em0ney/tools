<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Debugger</title>
  <style>
* {
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  margin: 0;
  padding: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  flex-direction: column;
  color: white;
}

h1 {
  margin: 0;
  padding: 16px 20px;
  font-size: 24px;
  font-weight: 300;
  text-align: center;
  flex-shrink: 0;
}

.columns {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.col-live {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255, 255, 255, 0.2);
}

.col-live-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.col-live-footer {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.12);
  font-size: 12px;
  opacity: 0.5;
}

.col-live-footer a {
  color: white;
  text-decoration: none;
}

.col-live-footer a:hover {
  text-decoration: underline;
}

.col-history {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.col-history h2 {
  margin: 0;
  padding: 14px 20px;
  font-size: 12px;
  font-weight: 400;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  flex-shrink: 0;
}

.history-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

.history-list::-webkit-scrollbar {
  width: 4px;
}
.history-list::-webkit-scrollbar-track {
  background: transparent;
}
.history-list::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
}

.history-item {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 8px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  animation: slideIn 0.15s ease-out;
}

.history-item:first-child {
  background: rgba(255, 255, 255, 0.1);
}

.history-combo {
  font-weight: 600;
  font-size: 15px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-meta {
  font-family: monospace;
  font-size: 10px;
  opacity: 0.5;
  text-align: right;
  white-space: nowrap;
  line-height: 1.6;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.key-display {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  align-items: center;
  padding: 40px;
  min-height: 200px;
}

.key {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 16px;
  padding: 30px 40px;
  font-size: 72px;
  font-weight: 700;
  text-transform: uppercase;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  animation: keyPress 0.2s ease-out;
  min-width: 120px;
  text-align: center;
}

@keyframes keyPress {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.key-info {
  margin-top: 16px;
  text-align: center;
  font-size: 12px;
  opacity: 0.8;
  font-family: monospace;
  max-width: 400px;
  padding: 0 20px;
  word-wrap: break-word;
}

.instructions {
  margin-top: 20px;
  text-align: center;
  font-size: 13px;
  opacity: 0.45;
  padding: 0 20px;
}
  </style>
</head>
<body>
  <h1>Keyboard debugger</h1>

  <div class="columns">
    <div class="col-live">
      <div class="col-live-main">
        <div class="key-display" id="keyDisplay"></div>
        <div class="key-info" id="keyInfo"></div>
        <div class="instructions">Press any key. Multiple keys can be pressed simultaneously.</div>
      </div>
      <div class="col-live-footer">
        <a href="index.html">← tools</a>
        <span id="lastUpdated"></span>
      </div>
    </div>
    <div class="col-history">
      <h2>Recent</h2>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

<script type="module">
const keyDisplay = document.getElementById('keyDisplay');
const keyInfo = document.getElementById('keyInfo');
const historyList = document.getElementById('historyList');
const pressedKeys = new Set();
const MAX_HISTORY = 80;

const MODIFIERS = new Set(['Shift', 'Control', 'Alt', 'Meta', 'CapsLock', 'AltGraph']);

const isMac = navigator.platform.includes('Mac');

const SPECIAL_LABELS = {
  ' ': 'Space',
  'Control': 'Ctrl',
  'Meta': isMac ? 'Cmd' : 'Win',
  'ArrowUp': '↑',
  'ArrowDown': '↓',
  'ArrowLeft': '←',
  'ArrowRight': '→',
  'Enter': '↵ Enter',
  'Backspace': '⌫ Backspace',
  'Tab': '⇥ Tab',
  'Shift': '⇧ Shift',
  'CapsLock': '⇪ Caps',
  'Escape': 'Esc'
};

function getKeyLabel(key) {
  return SPECIAL_LABELS[key] || key;
}

function updateDisplay() {
  keyDisplay.innerHTML = '';

  if (pressedKeys.size === 0) {
    keyDisplay.innerHTML = '<div style="opacity: 0.5; font-size: 24px;">Press any key...</div>';
  } else {
    pressedKeys.forEach(keyData => {
      const keyEl = document.createElement('div');
      keyEl.className = 'key';
      keyEl.textContent = keyData.label;
      keyDisplay.appendChild(keyEl);
    });
  }
}

function updateKeyInfo(event) {
  if (event) {
    const info = `Key: "${event.key}" | Code: "${event.code}" | KeyCode: ${event.keyCode}`;
    keyInfo.textContent = info;
  } else {
    keyInfo.textContent = '';
  }
}

function pushHistory(event) {
  // Build combo label from all currently pressed keys (modifiers first, then this key)
  const modifierOrder = ['Meta', 'Control', 'Alt', 'Shift'];
  const activeModifiers = modifierOrder.filter(m => {
    if (m === event.key) return false; // don't double-count the triggering key if it's a modifier
    return [...pressedKeys].some(k => k.key === m);
  });

  const parts = [...activeModifiers.map(m => getKeyLabel(m)), getKeyLabel(event.key)];
  const comboLabel = parts.join(' + ');

  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <span class="history-combo">${comboLabel}</span>
    <span class="history-meta">key: ${event.key === ' ' ? 'Space' : event.key}<br>code: ${event.code}<br>keyCode: ${event.keyCode}</span>
  `;
  historyList.prepend(item);

  while (historyList.children.length > MAX_HISTORY) {
    historyList.removeChild(historyList.lastChild);
  }
}

document.addEventListener('keydown', (e) => {
  if (['Tab', 'F5', 'F11'].includes(e.key)) {
    e.preventDefault();
  }

  const keyData = {
    code: e.code,
    key: e.key,
    label: getKeyLabel(e.key)
  };

  // Remove any existing entry with same code (handles held keys)
  pressedKeys.forEach(k => {
    if (k.code === keyData.code) pressedKeys.delete(k);
  });

  pressedKeys.add(keyData);
  updateDisplay();
  updateKeyInfo(e);

  // Only push history for non-modifier keys — combo is captured via pressedKeys
  if (!MODIFIERS.has(e.key)) {
    pushHistory(e);
  }
});

document.addEventListener('keyup', (e) => {
  pressedKeys.forEach(k => {
    if (k.code === e.code) pressedKeys.delete(k);
  });
  updateDisplay();
  if (pressedKeys.size === 0) {
    updateKeyInfo(null);
  }
});

window.addEventListener('blur', () => {
  pressedKeys.clear();
  updateDisplay();
  updateKeyInfo(null);
});

updateDisplay();

// Fetch last-updated date from GitHub API (non-blocking)
fetch('https://api.github.com/repos/em0ney/tools/commits?path=keyboard-debug.html&per_page=1')
  .then(r => r.json())
  .then(data => {
    const date = data?.[0]?.commit?.committer?.date;
    if (date) {
      const formatted = new Date(date).toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
      document.getElementById('lastUpdated').textContent = `updated ${formatted}`;
    }
  })
  .catch(() => {});
</script>
</body>
</html>
