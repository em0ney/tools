<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Debugger</title>
  <style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: white;
}

h1 {
  margin: 20px;
  font-size: 28px;
  font-weight: 300;
  text-align: center;
  flex-shrink: 0;
}

.columns {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.col-live {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid rgba(255, 255, 255, 0.2);
}

.col-history {
  width: 280px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.col-history h2 {
  margin: 0;
  padding: 16px 20px;
  font-size: 13px;
  font-weight: 400;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  flex-shrink: 0;
}

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.history-list::-webkit-scrollbar {
  width: 4px;
}
.history-list::-webkit-scrollbar-track {
  background: transparent;
}
.history-list::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
}

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 20px;
  font-size: 14px;
  animation: slideIn 0.15s ease-out;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.history-item:first-child {
  background: rgba(255, 255, 255, 0.1);
}

.history-label {
  font-weight: 600;
  font-size: 15px;
}

.history-meta {
  font-family: monospace;
  font-size: 11px;
  opacity: 0.55;
  text-align: right;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.key-display {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  align-items: center;
  padding: 40px;
  min-height: 240px;
}

.key {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 16px;
  padding: 30px 40px;
  font-size: 72px;
  font-weight: 700;
  text-transform: uppercase;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  animation: keyPress 0.2s ease-out;
  min-width: 120px;
  text-align: center;
}

@keyframes keyPress {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.key-info {
  margin-top: 20px;
  text-align: center;
  font-size: 12px;
  opacity: 0.8;
  font-family: monospace;
  max-width: 400px;
  padding: 0 20px;
  word-wrap: break-word;
}

.instructions {
  text-align: center;
  font-size: 13px;
  opacity: 0.5;
  padding: 16px 20px;
  flex-shrink: 0;
}
  </style>
</head>
<body>
  <h1>Keyboard debugger</h1>

  <div class="columns">
    <div class="col-live">
      <div class="key-display" id="keyDisplay"></div>
      <div class="key-info" id="keyInfo"></div>
      <div class="instructions">Press any key. Multiple keys can be pressed simultaneously.</div>
    </div>
    <div class="col-history">
      <h2>Recent</h2>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

<script type="module">
const keyDisplay = document.getElementById('keyDisplay');
const keyInfo = document.getElementById('keyInfo');
const historyList = document.getElementById('historyList');
const pressedKeys = new Set();
const MAX_HISTORY = 60;

function getKeyLabel(event) {
  const key = event.key;

  // Special key mappings
  const specialKeys = {
    ' ': 'Space',
    'Control': 'Ctrl',
    'Meta': navigator.platform.includes('Mac') ? 'Cmd' : 'Win',
    'ArrowUp': '↑',
    'ArrowDown': '↓',
    'ArrowLeft': '←',
    'ArrowRight': '→',
    'Enter': '↵ Enter',
    'Backspace': '⌫ Backspace',
    'Tab': '⇥ Tab',
    'Shift': '⇧ Shift',
    'CapsLock': '⇪ Caps',
    'Escape': 'Esc'
  };

  return specialKeys[key] || key;
}

function updateDisplay() {
  keyDisplay.innerHTML = '';

  if (pressedKeys.size === 0) {
    keyDisplay.innerHTML = '<div style="opacity: 0.5; font-size: 24px;">Press any key...</div>';
  } else {
    pressedKeys.forEach(keyData => {
      const keyEl = document.createElement('div');
      keyEl.className = 'key';
      keyEl.textContent = keyData.label;
      keyDisplay.appendChild(keyEl);
    });
  }
}

function updateKeyInfo(event) {
  if (event) {
    const info = `Key: "${event.key}" | Code: "${event.code}" | KeyCode: ${event.keyCode}`;
    keyInfo.textContent = info;
  } else {
    keyInfo.textContent = '';
  }
}

function pushHistory(event) {
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <span class="history-label">${getKeyLabel(event)}</span>
    <span class="history-meta">${event.code}<br>${event.key === ' ' ? 'Space' : event.key}</span>
  `;
  historyList.prepend(item);
  // Trim excess entries
  while (historyList.children.length > MAX_HISTORY) {
    historyList.removeChild(historyList.lastChild);
  }
}

document.addEventListener('keydown', (e) => {
  // Prevent default for some keys to avoid unwanted behavior
  if (['Tab', 'F5', 'F11'].includes(e.key)) {
    e.preventDefault();
  }

  const keyData = {
    code: e.code,
    label: getKeyLabel(e)
  };

  // Remove any existing entry with same code
  pressedKeys.forEach(k => {
    if (k.code === keyData.code) {
      pressedKeys.delete(k);
    }
  });

  pressedKeys.add(keyData);
  updateDisplay();
  updateKeyInfo(e);
  pushHistory(e);
});

document.addEventListener('keyup', (e) => {
  pressedKeys.forEach(k => {
    if (k.code === e.code) {
      pressedKeys.delete(k);
    }
  });
  updateDisplay();
  if (pressedKeys.size === 0) {
    updateKeyInfo(null);
  }
});

// Handle window blur to clear keys
window.addEventListener('blur', () => {
  pressedKeys.clear();
  updateDisplay();
  updateKeyInfo(null);
});

// Initial display
updateDisplay();
</script>
</body>
</html>
